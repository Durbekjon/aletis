# Production stack — run with: docker compose -p aletis-prod -f docker-compose.prod.yml up -d --build
# Host ports: frontend 3000, backend 4000. nginx (on host) proxies the domains to these.
name: aletis-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aletis]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [aletis]
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: multi2vec-clip
      CLIP_INFERENCE_API: http://multi2vec-clip:8080
      CLUSTER_HOSTNAME: node1
    depends_on:
      multi2vec-clip: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks: [aletis]
    restart: unless-stopped

  # CLIP inference for multi2vec-clip (image + text product search). CPU-only.
  multi2vec-clip:
    image: cr.weaviate.io/semitechnologies/multi2vec-clip:sentence-transformers-clip-ViT-B-32-multilingual-v1
    environment:
      ENABLE_CUDA: "0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/.well-known/ready')"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks: [aletis]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: [.env.prod]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      weaviate: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/docs',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks: [aletis]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.aletis.me/api
        NEXT_PUBLIC_BACKEND_URL: https://api.aletis.me
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [backend]
    networks: [aletis]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  weaviate_data:

networks:
  aletis:
    driver: bridge
