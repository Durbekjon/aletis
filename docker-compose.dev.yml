# Development stack — run with: docker compose -p aletis-dev -f docker-compose.dev.yml up -d --build
# Host ports: frontend 3001, backend 4001 (offset so prod + dev coexist on one VPS).
# Fully isolated volumes/network from prod.
name: aletis-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aletis_dev]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [aletis_dev]
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data_dev:/var/lib/weaviate
    networks: [aletis_dev]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: [.env.dev]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
    ports:
      - "127.0.0.1:4001:4000"
    volumes:
      - uploads_data_dev:/app/public/uploads
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      weaviate: { condition: service_started }
    networks: [aletis_dev]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://dev-api.aletis.me/api
        NEXT_PUBLIC_BACKEND_URL: https://dev-api.aletis.me
    ports:
      - "127.0.0.1:3001:3000"
    depends_on: [backend]
    networks: [aletis_dev]
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:
  uploads_data_dev:
  weaviate_data_dev:

networks:
  aletis_dev:
    driver: bridge
