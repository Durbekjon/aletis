# Aletis nginx reverse proxy
# Place at /etc/nginx/sites-available/aletis.conf and symlink into sites-enabled,
# or drop into /etc/nginx/conf.d/. Run `nginx -t && systemctl reload nginx` after changes.
#
# Upstreams map to the container host-ports from docker-compose:
#   prod frontend 3000 / backend 4000   |   dev frontend 3001 / backend 4001
#
# SSL certificate paths assume certbot (see ssl-setup.md). For the very first issuance
# comment out the `ssl_certificate*` lines + the 443 blocks, obtain certs over HTTP-01,
# then re-enable.

# ---------- shared proxy settings ----------
proxy_http_version 1.1;
client_max_body_size 25m;   # allow product image / media uploads

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =========================================================
# PRODUCTION
# =========================================================
server {
    listen 80;
    server_name aletis.me www.aletis.me api.aletis.me;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Frontend — aletis.me
server {
    listen 443 ssl;
    http2 on;
    server_name aletis.me www.aletis.me;

    ssl_certificate     /etc/letsencrypt/live/aletis.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aletis.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Backend API — api.aletis.me
server {
    listen 443 ssl;
    http2 on;
    server_name api.aletis.me;

    ssl_certificate     /etc/letsencrypt/live/api.aletis.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aletis.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;   # long-poll / SSE for bot pipeline
    }
}

# =========================================================
# DEVELOPMENT
# =========================================================
server {
    listen 80;
    server_name dev.aletis.me dev-api.aletis.me;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Frontend — dev.aletis.me
server {
    listen 443 ssl;
    http2 on;
    server_name dev.aletis.me;

    ssl_certificate     /etc/letsencrypt/live/dev.aletis.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.aletis.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Backend API — dev-api.aletis.me
server {
    listen 443 ssl;
    http2 on;
    server_name dev-api.aletis.me;

    ssl_certificate     /etc/letsencrypt/live/dev-api.aletis.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.aletis.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
